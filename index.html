<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pick Two — Good · Fast · Easy</title>
    <!-- 🎯 Favicon (emoji-based, no image file needed) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🎯</text></svg>">
    <style>
        :root {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text: #2d3436;
            --text-muted: #636e72;
            --on-bg: #d4f7dc;
            --on-border: #2ecc71;
            --on-text: #1a7a3a;
            --on-glow: rgba(46, 204, 113, 0.35);
            --off-bg: #f8f9fa;
            --off-border: #d5dbe0;
            --off-text: #555;
            --blocked-bg: #f1f1f1;
            --blocked-border: #e0e0e0;
            --blocked-text: #b0b0b0;
            --blocked-stripe: #e74c3c;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 6px 24px rgba(0, 0, 0, 0.10);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.14);
            --radius: 20px;
            --radius-inner: 14px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(160deg, #e8ecf1 0%, #dce3e8 30%, #eef1f5 60%, #e4e9ef 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-attachment: fixed;
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.25;
            pointer-events: none;
            z-index: 0;
            animation: floatBubble 18s ease-in-out infinite;
        }
        body::before {
            width: 380px;
            height: 380px;
            background: #a0d8ef;
            top: -120px;
            right: -100px;
            animation-delay: 0s;
        }
        body::after {
            width: 340px;
            height: 340px;
            background: #c4e8d0;
            bottom: -100px;
            left: -110px;
            animation-delay: -9s;
        }

        @keyframes floatBubble {
            0%, 100% { transform: translate(0, 0) scale(1); }
            20% { transform: translate(30px, -40px) scale(1.08); }
            40% { transform: translate(-20px, 25px) scale(0.94); }
            60% { transform: translate(-35px, -15px) scale(1.05); }
            80% { transform: translate(25px, 35px) scale(0.96); }
        }

        .container {
            position: relative;
            z-index: 1;
            background: var(--card-bg);
            border-radius: 28px;
            padding: 40px 36px 36px;
            box-shadow: var(--shadow-lg), 0 0 0 1px rgba(0, 0, 0, 0.04);
            max-width: 620px;
            width: 100%;
            text-align: center;
        }

        .header {
            margin-bottom: 10px;
        }

        .header .icon-row {
            font-size: 2.4rem;
            letter-spacing: 6px;
            margin-bottom: 4px;
            animation: gentlePulse 4s ease-in-out infinite;
        }

        @keyframes gentlePulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.02em;
            margin: 0 0 6px;
        }

        .header .subtitle {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .divider {
            width: 50px;
            height: 3px;
            background: linear-gradient(90deg, #2ecc71, #3498db, #e74c3c);
            border-radius: 2px;
            margin: 16px auto 24px;
            opacity: 0.6;
        }

        .buttons-row {
            display: flex;
            gap: 18px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .toggle-btn {
            flex: 1 1 140px;
            min-width: 130px;
            max-width: 180px;
            padding: 22px 16px 20px;
            border-radius: var(--radius);
            border: 2.5px solid var(--off-border);
            background: var(--off-bg);
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            outline: none;
            box-shadow: var(--shadow-sm);
            font-family: inherit;
            -webkit-user-select: none;
        }

        .toggle-btn:focus-visible {
            box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.35);
            outline: none;
        }

        .toggle-btn:hover:not(.blocked) {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
            border-color: #bcc4cc;
        }

        .toggle-btn:active:not(.blocked) {
            transform: translateY(-1px) scale(0.97);
            transition: all 0.1s ease;
        }

        /* ON state */
        .toggle-btn.on {
            background: var(--on-bg);
            border-color: var(--on-border);
            box-shadow: 0 0 0 6px var(--on-glow), var(--shadow-md);
            color: var(--on-text);
            cursor: pointer;
        }
        .toggle-btn.on:hover {
            border-color: #27ae60;
            box-shadow: 0 0 0 10px rgba(46, 204, 113, 0.25), var(--shadow-md);
            transform: translateY(-3px);
        }
        .toggle-btn.on:active {
            transform: translateY(-1px) scale(0.97);
        }

        /* BLOCKED state */
        .toggle-btn.blocked {
            background: var(--blocked-bg);
            border-color: var(--blocked-border);
            cursor: not-allowed;
            opacity: 0.55;
            box-shadow: none;
            position: relative;
            overflow: hidden;
        }
        .toggle-btn.blocked::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--blocked-stripe);
            opacity: 0.5;
            border-radius: 0 0 2px 2px;
        }
        .toggle-btn.blocked:hover {
            transform: none;
            box-shadow: none;
        }

        .toggle-btn.blocked.shake {
            animation: shake 0.45s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            15% { transform: translateX(-6px); }
            30% { transform: translateX(6px); }
            45% { transform: translateX(-5px); }
            60% { transform: translateX(4px); }
            75% { transform: translateX(-2px); }
            90% { transform: translateX(2px); }
        }

        .toggle-btn .emoji {
            font-size: 3rem;
            line-height: 1;
            transition: transform var(--transition), filter var(--transition);
        }
        .toggle-btn.on .emoji {
            transform: scale(1.1);
            filter: drop-shadow(0 2px 4px rgba(46, 204, 113, 0.4));
        }
        .toggle-btn.blocked .emoji {
            transform: scale(0.85);
            filter: grayscale(0.6) blur(0.5px);
            opacity: 0.7;
        }

        .toggle-btn .label {
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            transition: color var(--transition);
        }
        .toggle-btn.on .label {
            color: var(--on-text);
            font-weight: 700;
        }
        .toggle-btn.blocked .label {
            color: var(--blocked-text);
        }

        .toggle-btn .status-tag {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            padding: 3px 10px;
            border-radius: 20px;
            transition: all var(--transition);
            opacity: 0;
            transform: translateY(4px);
            pointer-events: none;
        }
        .toggle-btn.on .status-tag {
            opacity: 1;
            transform: translateY(0);
            background: #2ecc71;
            color: #fff;
        }
        .toggle-btn.off .status-tag {
            opacity: 1;
            transform: translateY(0);
            background: #e8ecf0;
            color: #777;
        }
        .toggle-btn.blocked .status-tag {
            opacity: 1;
            transform: translateY(0);
            background: #fde8e8;
            color: #c0392b;
        }

        .message-area {
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 8px;
        }
        .message {
            font-size: 1.05rem;
            font-weight: 500;
            color: var(--text-muted);
            transition: all var(--transition);
            line-height: 1.4;
        }
        .message.emphasized {
            font-weight: 600;
            color: var(--text);
            font-size: 1.1rem;
        }
        .message .highlight {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: 700;
            margin: 0 2px;
        }
        .highlight.green {
            background: #d4f7dc;
            color: #1a7a3a;
        }
        .highlight.blue {
            background: #d6eaf8;
            color: #1a5276;
        }
        .highlight.red {
            background: #fde8e8;
            color: #922b21;
        }

        .reset-link {
            display: inline-block;
            margin-top: 12px;
            font-size: 0.85rem;
            color: #999;
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 3px;
            transition: color 0.2s;
            background: none;
            border: none;
            font-family: inherit;
            padding: 4px 8px;
        }
        .reset-link:hover {
            color: #555;
        }

        @media (max-width: 500px) {
            .container {
                padding: 28px 16px 24px;
                border-radius: 22px;
            }
            .buttons-row {
                gap: 10px;
            }
            .toggle-btn {
                flex: 1 1 90px;
                min-width: 85px;
                padding: 16px 10px 14px;
                border-radius: 16px;
            }
            .toggle-btn .emoji {
                font-size: 2.2rem;
            }
            .toggle-btn .label {
                font-size: 0.9rem;
            }
            .toggle-btn .status-tag {
                font-size: 0.6rem;
                padding: 2px 7px;
            }
            .header h1 {
                font-size: 1.5rem;
            }
            .header .icon-row {
                font-size: 1.8rem;
            }
            .message {
                font-size: 0.9rem;
            }
            .message.emphasized {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon-row">🎯</div>
            <h1>Pick Two</h1>
            <p class="subtitle">Good · Fast · Easy</p>
        </div>
        <div class="divider"></div>

        <div class="buttons-row">
            <button class="toggle-btn off" data-name="good" aria-label="Good - Available">
                <span class="emoji">⚪</span>
                <span class="label">Good</span>
                <span class="status-tag">Available</span>
            </button>
            <button class="toggle-btn off" data-name="fast" aria-label="Fast - Available">
                <span class="emoji">⚪</span>
                <span class="label">Fast</span>
                <span class="status-tag">Available</span>
            </button>
            <button class="toggle-btn off" data-name="easy" aria-label="Easy - Available">
                <span class="emoji">⚪</span>
                <span class="label">Easy</span>
                <span class="status-tag">Available</span>
            </button>
        </div>

        <div class="message-area">
            <p class="message" id="message">Choose up to two priorities 👆</p>
        </div>

        <button class="reset-link" id="resetBtn" title="Reset all selections">↺ Start over</button>
    </div>

    <script>
        (function() {
            const state = {
                good: 'off',
                fast: 'off',
                easy: 'off',
            };

            const buttons = document.querySelectorAll('.toggle-btn');
            const messageEl = document.getElementById('message');
            const resetBtn = document.getElementById('resetBtn');

            const nameToKey = {
                good: 'good',
                fast: 'fast',
                easy: 'easy',
            };

            function getMessage() {
                const onKeys = Object.entries(state)
                    .filter(([, val]) => val === 'on')
                    .map(([key]) => key);
                const count = onKeys.length;
                const sorted = onKeys.sort().join('+');

                if (count === 0) {
                    return { text: 'Choose up to two priorities 👆', emphasized: false };
                }
                if (count === 1) {
                    const labels = { good: 'Good', fast: 'Fast', easy: 'Easy' };
                    const label = labels[onKeys[0]];
                    return { text: `"${label}" selected — pick one more...`, emphasized: false };
                }
                if (count === 2) {
                    const combos = {
                        'good+fast': {
                            html: 'Good + Fast = <span class="highlight red">Not Easy</span> 😅',
                            emphasized: true,
                        },
                        'good+easy': {
                            html: 'Good + Easy = <span class="highlight blue">Not Fast</span> 🐢',
                            emphasized: true,
                        },
                        'fast+easy': {
                            html: 'Fast + Easy = <span class="highlight green">Not Good</span> ⚠️',
                            emphasized: true,
                        },
                    };
                    return { html: combos[sorted]?.html || '', emphasized: true };
                }
                return { text: '', emphasized: false };
            }

            function updateUI() {
                buttons.forEach((btn) => {
                    const name = btn.dataset.name;
                    const currentState = state[nameToKey[name]];
                    btn.classList.remove('on', 'off', 'blocked');
                    btn.classList.add(currentState);

                    const emojiSpan = btn.querySelector('.emoji');
                    const statusTag = btn.querySelector('.status-tag');

                    switch (currentState) {
                        case 'on':
                            emojiSpan.textContent = '✅';
                            statusTag.textContent = 'Selected';
                            btn.setAttribute('aria-label', `${name.charAt(0).toUpperCase() + name.slice(1)} — Selected`);
                            break;
                        case 'off':
                            emojiSpan.textContent = '⚪';  // Neutral circle
                            statusTag.textContent = 'Available';
                            btn.setAttribute('aria-label', `${name.charAt(0).toUpperCase() + name.slice(1)} — Available`);
                            break;
                        case 'blocked':
                            emojiSpan.textContent = '🚫';
                            statusTag.textContent = 'Unavailable';
                            btn.setAttribute('aria-label', `${name.charAt(0).toUpperCase() + name.slice(1)} — Unavailable`);
                            break;
                    }
                });

                const msg = getMessage();
                messageEl.innerHTML = '';
                if (msg.html) {
                    messageEl.innerHTML = msg.html;
                } else {
                    messageEl.textContent = msg.text;
                }
                if (msg.emphasized) {
                    messageEl.classList.add('emphasized');
                } else {
                    messageEl.classList.remove('emphasized');
                }

                const anyOn = Object.values(state).some((s) => s === 'on');
                resetBtn.style.opacity = anyOn ? '1' : '0.4';
                resetBtn.style.pointerEvents = anyOn ? 'auto' : 'none';
                resetBtn.setAttribute('aria-disabled', anyOn ? 'false' : 'true');
            }

            function recalculateBlocking() {
                const onCount = Object.values(state).filter((s) => s === 'on').length;
                if (onCount >= 2) {
                    for (const key in state) {
                        if (state[key] === 'off') {
                            state[key] = 'blocked';
                        }
                    }
                } else {
                    for (const key in state) {
                        if (state[key] === 'blocked') {
                            state[key] = 'off';
                        }
                    }
                }
            }

            function handleButtonClick(btn) {
                const name = btn.dataset.name;
                const key = nameToKey[name];
                const currentState = state[key];

                if (currentState === 'blocked') {
                    btn.classList.remove('shake');
                    void btn.offsetWidth;
                    btn.classList.add('shake');
                    btn.addEventListener('animationend', function handler() {
                        btn.classList.remove('shake');
                        btn.removeEventListener('animationend', handler);
                    });
                    return;
                }

                if (currentState === 'off') {
                    state[key] = 'on';
                } else if (currentState === 'on') {
                    state[key] = 'off';
                }

                recalculateBlocking();
                updateUI();
            }

            function resetAll() {
                for (const key in state) {
                    state[key] = 'off';
                }
                updateUI();
                resetBtn.style.transform = 'scale(1.15)';
                setTimeout(() => {
                    resetBtn.style.transform = 'scale(1)';
                }, 150);
            }

            buttons.forEach((btn) => {
                btn.addEventListener('click', () => handleButtonClick(btn));
                btn.addEventListener('touchstart', function(e) {
                    if (state[nameToKey[btn.dataset.name]] === 'blocked') {
                        e.preventDefault();
                        handleButtonClick(btn);
                    }
                }, { passive: false });
            });

            resetBtn.addEventListener('click', resetAll);

            document.addEventListener('keydown', (e) => {
                const focused = document.activeElement;
                if (focused && focused.classList.contains('toggle-btn') && (e.key === 'Enter' || e.key === ' ')) {
                    e.preventDefault();
                    handleButtonClick(focused);
                }
            });

            updateUI();
            resetBtn.style.opacity = '0.4';
            resetBtn.style.pointerEvents = 'none';
            resetBtn.setAttribute('aria-disabled', 'true');
            resetBtn.style.transition = 'opacity 0.3s, transform 0.2s';
        })();
    </script>
</body>
</html>
